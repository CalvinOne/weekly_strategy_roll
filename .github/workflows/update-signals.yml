name: Update Weekly Strategy Dashboard

on:
  workflow_dispatch:
  schedule:
    # Beijing Monday 08:05, near the BTC weekly open and before most broker sessions settle.
    - cron: "5 0 * * 1"
    # Refresh every 4 hours on UTC weekdays. This covers the Mon-Fri monitoring loop.
    - cron: "10 */4 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate signals
        run: python scripts/generate_signals.py

      - name: Build static site
        run: |
          mkdir -p _site/data
          cp index.html styles.css _site/
          cp data/signals.json _site/data/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
