name: Update Weekly Strategy Dashboard

on:
  workflow_dispatch:
  schedule:
    # Monday 08:05 Beijing, near the BTC weekly open.
    - cron: "5 8 * * 1"
      timezone: "Asia/Shanghai"
    # Weekday monitoring loop every 4 hours (00:10, 04:10, 08:10, ...).
    - cron: "10 */4 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule || 'n/a' }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate signals
        run: python scripts/generate_signals.py

      - name: Generate scanner pages
        run: python scripts/generate_scanner.py --type all --limit 200 --altcoin-sleep 0.15 --stock-sleep 0.6
        timeout-minutes: 90

      - name: Run strategy comparison
        run: python scripts/backtest_strategy.py

      - name: Build static site
        run: |
          mkdir -p _site/data _site/assets
          cp index.html altcoins.html stocks.html styles.css _site/
          cp -R assets _site/
          cp data/*.json _site/data/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
