name: Update Weekly Strategy Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Monday 08:05 Beijing, near the BTC weekly open.
    - cron: "5 8 * * 1"
      timezone: "Asia/Shanghai"
    # Weekday monitoring loop every 4 hours (00:10, 04:10, 08:10, ...).
    - cron: "10 */4 * * 1-5"
      timezone: "Asia/Shanghai"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule || 'n/a' }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate signals
        run: python scripts/generate_signals.py

      - name: Generate stock scanner
        run: python scripts/generate_scanner.py --type stocks --limit 200 --stock-sleep 0.6
        timeout-minutes: 45

      - name: Generate altcoin scanner
        run: python scripts/generate_scanner.py --type altcoins --limit 200 --altcoin-sleep 0.2
        timeout-minutes: 90
        continue-on-error: true

      - name: Run strategy comparison
        run: python scripts/backtest_strategy.py

      - name: Verify scanner outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for name in ("altcoins_signals.json", "stocks_signals.json"):
              path = Path("data") / name
              payload = json.loads(path.read_text(encoding="utf-8"))
              scanned = int(payload.get("scanned") or 0)
              if scanned <= 0:
                  raise SystemExit(f"{name} has no scanned instruments; refusing to deploy empty scanner data.")
              print(f"{name}: scanned={scanned} generated_at={payload.get('generated_at')}")
          PY

      - name: Build static site
        run: |
          mkdir -p _site/data _site/assets
          cp index.html altcoins.html stocks.html styles.css _site/
          cp -R assets _site/
          cp data/*.json _site/data/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
